name: FlyTrack Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Etapa 1: Pruebas ───────────────────────────────────────────
  test:
    name: Pruebas Unitarias
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar pruebas con cobertura
        run: npm test

  # ─── Etapa 2: Build Docker ──────────────────────────────────────
  build:
    name: Construir imagen Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t flytrack-backend:${{ github.sha }} .

      - name: Verificar imagen creada
        run: docker images flytrack-backend

  # ─── Etapa 3: Deploy en EC2 ─────────────────────────────────────
  deploy:
    name: Despliegue en AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu
            if [ ! -d "flytrack-backend" ]; then
              sudo git clone https://github.com/AndreaYr/flytrack-backend.git
            else
              cd flytrack-backend && sudo git pull origin main && cd ..
            fi
            cd flytrack-backend
            sudo docker stop flytrack-backend || true
            sudo docker rm flytrack-backend || true
            sudo docker build -t flytrack-backend .
            sudo docker run -d --name flytrack-backend -p 3001:3001 flytrack-backend
            echo "Despliegue completado en EC2"
